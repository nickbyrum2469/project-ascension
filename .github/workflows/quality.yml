name: Foundation Quality Gate

on:
  push:
    branches: [main, "foundation/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Type-check
        shell: bash
        run: |
          set +e
          npm run check 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload type-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3
      - name: Production smoke checks
        run: npm run test:smoke
      - name: Build browser release
        run: npm run build
      - name: Upload browser build
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-browser-build
          path: dist
          if-no-files-found: error
          retention-days: 14
