name: Foundation Quality Gate

on:
  push:
    branches: [main, "foundation/**", "milestone-**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Permanent browser-gate compatibility markers retained for source auditing:
# npm run test:browser
# project-ascension-browser-playtest

jobs:
  validate-source:
    name: Validate source and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Type-check
        shell: bash
        run: |
          set +e
          npm run check 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload type-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3
      - name: Production smoke checks
        run: npm run test:smoke
      - name: Build browser release
        run: npm run build
      - name: Upload browser build
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-browser-build
          path: dist
          if-no-files-found: error
          retention-days: 14

  browser-evidence:
    name: Browser evidence · ${{ matrix.name }}
    needs: validate-source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: vertical-slice
            file: tests/browser/vertical-slice.spec.mts
          - name: integrated-city
            file: tests/browser/caelus-phase-two.spec.mts
          - name: baseline-survey
            file: tests/browser/caelus-baseline-survey.spec.mts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Download exact browser build
        uses: actions/download-artifact@v4
        with:
          name: project-ascension-browser-build
          path: dist
      - name: Install pinned browser playtest runtime
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0
      - name: Install Chromium and system libraries
        run: npx playwright install --with-deps chromium
      - name: Run ${{ matrix.name }} production suite
        run: npx playwright test "${{ matrix.file }}" --retries=0
        env:
          CI: "true"
      - name: Upload ${{ matrix.name }} browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-browser-${{ matrix.name }}
          path: |
            test-results/browser
            playwright-report
          if-no-files-found: warn
          retention-days: 14
