name: Foundation Quality Gate

on:
  push:
    branches: [main, "foundation/**", "milestone-**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Type-check
        shell: bash
        run: |
          set +e
          npm run check 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload type-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3
      - name: Production smoke checks
        run: npm run test:smoke
      - name: Build browser release
        run: npm run build
      - name: Upload browser build
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-browser-build
          path: dist
          if-no-files-found: error
          retention-days: 14
      - name: Install pinned browser playtest runtime
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0
      - name: Install Chromium and system libraries
        run: npx playwright install --with-deps chromium
      - name: Browser vertical-slice playtest
        run: npm run test:browser
        env:
          CI: "true"
      - name: Upload browser playtest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-browser-playtest
          path: |
            test-results/browser
            playwright-report
          if-no-files-found: warn
          retention-days: 14
