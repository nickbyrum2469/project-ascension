name: Publish Latest Test Build

on:
  push:
    branches:
      - "milestone-**"
      - "feature/**"
      - "fix/**"
      - "development/**"
      - "codex/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to publish as the latest test build"
        required: true
        default: "main"

permissions:
  contents: write

concurrency:
  group: project-ascension-latest-preview
  cancel-in-progress: true

jobs:
  publish-preview:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out requested test build
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          path: source

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Remove previously published preview from source build
        run: rm -rf source/public/preview

      - name: Install locked dependencies
        working-directory: source
        run: npm ci

      - name: Validate test build
        working-directory: source
        run: |
          npm run check
          npm run test:smoke

      - name: Build exact browser release
        working-directory: source
        run: npm run build

      - name: Check out stable publishing branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: publish
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace permanent preview site
        shell: bash
        run: |
          rm -rf publish/public/preview
          mkdir -p publish/public/preview
          cp -R source/dist/. publish/public/preview/

          # The preview must always load the newest files. Keep its service worker
          # scoped to /preview/ but disable asset caching to prevent stale builds.
          cat > publish/public/preview/sw.js <<'EOF'
          self.addEventListener("install", () => self.skipWaiting());
          self.addEventListener("activate", (event) => {
            event.waitUntil(self.clients.claim());
          });
          EOF

          SOURCE_SHA="$(git -C source rev-parse HEAD)"
          SHORT_SHA="${SOURCE_SHA:0:12}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          python3 - "$SHORT_SHA" "$PUBLISHED_AT" <<'PY'
          from pathlib import Path
          import html
          import sys

          short_sha, published_at = sys.argv[1], sys.argv[2]
          path = Path("publish/public/preview/index.html")
          document = path.read_text(encoding="utf-8")
          document = document.replace(
              "<title>Project Ascension — The Verdant Foundation</title>",
              "<title>Project Ascension — Latest Test Build</title>",
          )
          badge = f'''\n      <div id="latest-test-build-badge" style="position:fixed;right:12px;bottom:12px;z-index:99999;padding:7px 10px;border:1px solid rgba(142,247,255,.45);border-radius:6px;background:rgba(4,11,19,.82);color:#bffbff;font:600 11px/1.25 system-ui,sans-serif;letter-spacing:.08em;pointer-events:none;backdrop-filter:blur(8px)">LATEST TEST BUILD · {html.escape(short_sha)}</div>'''
          document = document.replace("<body>", "<body>" + badge, 1)
          path.write_text(document, encoding="utf-8")
          PY

          cat > publish/public/preview/preview-version.json <<EOF
          {
            "channel": "latest-test-build",
            "sourceSha": "$SOURCE_SHA",
            "shortSha": "$SHORT_SHA",
            "publishedAt": "$PUBLISHED_AT",
            "sourceRef": "${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}"
          }
          EOF

      - name: Commit newest preview to main
        working-directory: publish
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A public/preview
          if git diff --cached --quiet; then
            echo "Preview already matches this build."
            exit 0
          fi
          SOURCE_SHA="$(git -C ../source rev-parse --short=12 HEAD)"
          git commit -m "preview: publish latest test build ${SOURCE_SHA}"
          git push origin HEAD:main
