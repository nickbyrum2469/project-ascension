name: Materialize Foundation Source

on:
  push:
    branches:
      - foundation/milestone-01
    paths:
      - "bootstrap/**"
      - "bootstrap.mjs"
      - ".github/workflows/materialize.yml"
  pull_request:
    branches:
      - main
    paths:
      - "bootstrap/**"
      - "bootstrap.mjs"
      - ".github/workflows/materialize.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[materialized]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out foundation branch
        uses: actions/checkout@v4
        with:
          ref: foundation/milestone-01
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Expand reviewed source archive
        run: node bootstrap.mjs

      - name: Remove bootstrap transport
        run: rm -rf bootstrap bootstrap.mjs .github/workflows/materialize.yml

      - name: Commit expanded playable foundation
        run: |
          git config user.name "Project Ascension Build"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "[materialized] foundation: expand playable browser build"
          git push origin HEAD:foundation/milestone-01
