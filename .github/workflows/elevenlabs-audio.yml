name: Produce ElevenLabs Audio

on:
  workflow_dispatch:
    inputs:
      force_regeneration:
        description: Regenerate existing audio files and spend credits again
        required: false
        default: false
        type: boolean
  push:
    branches: ["milestone-02/world-ui-rebuild"]
    paths:
      - ".github/workflows/elevenlabs-audio.yml"

permissions:
  contents: write

concurrency:
  group: elevenlabs-audio-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Confirm secure API configuration
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -z "$ELEVENLABS_API_KEY" ]; then
            echo "ELEVENLABS_API_KEY repository secret is missing."
            exit 1
          fi
          echo "ElevenLabs repository secret is available."

      - name: Generate production audio
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ "${{ inputs.force_regeneration }}" = "true" ]; then
            node scripts/generate-elevenlabs-audio.mjs audio/production/foundation-v1.json --force
          else
            node scripts/generate-elevenlabs-audio.mjs audio/production/foundation-v1.json
          fi

      - name: Commit generated game audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/audio/generated
          if git diff --cached --quiet; then
            echo "No audio files changed."
            exit 0
          fi
          git commit -m "audio: generate ElevenLabs foundation sound pack"
          git push origin "HEAD:${GITHUB_REF_NAME}"
