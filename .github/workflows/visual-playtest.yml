name: Visual Playtest

on:
  pull_request:
    branches:
      - site-test
  push:
    branches:
      - site-test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-playtest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browser harness
        run: |
          npm install --no-save --no-package-lock playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start production preview
        run: |
          npm run preview -- --port 4173 > /tmp/project-ascension-preview.log 2>&1 &
          echo $! > /tmp/project-ascension-preview.pid
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              echo "Preview server is ready."
              exit 0
            fi
            sleep 1
          done
          cat /tmp/project-ascension-preview.log
          exit 1

      - name: Run visual playtest and capture screenshots
        env:
          PLAYTEST_URL: http://127.0.0.1:4173
          PLAYTEST_OUTPUT_DIR: artifacts/visual-playtest
        run: node scripts/ci-visual-playtest.mjs

      - name: Save preview server log
        if: always()
        run: |
          mkdir -p artifacts/visual-playtest
          cp /tmp/project-ascension-preview.log artifacts/visual-playtest/preview-server.log || true

      - name: Upload visual playtest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ascension-visual-playtest
          path: artifacts/visual-playtest
          if-no-files-found: error
          retention-days: 14
