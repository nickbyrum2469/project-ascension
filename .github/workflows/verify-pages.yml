name: Verify Live Browser Release

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/release-probe-trigger.md"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe live game
        id: probe
        shell: bash
        run: |
          URL="https://nickbyrum2469.github.io/project-ascension/"
          STATUS="not-live"
          CODE="000"
          for attempt in {1..8}; do
            CODE=$(curl --location --silent --output /tmp/ascension.html --write-out "%{http_code}" --max-time 20 "$URL" || true)
            if [ "$CODE" = "200" ] && grep -q "PROJECT ASCENSION" /tmp/ascension.html; then
              STATUS="live"
              break
            fi
            sleep 15
          done
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
      - name: Report deployment result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.probe.outputs.status }}';
            const code = '${{ steps.probe.outputs.code }}';
            const url = 'https://nickbyrum2469.github.io/project-ascension/';
            const body = status === 'live'
              ? `✅ **Project Ascension is live.**\n\nPlayable URL: ${url}\n\nThe production page returned HTTP 200 and contained the Project Ascension game shell.`
              : `⚠️ **The game build is green, but GitHub Pages is not live yet.**\n\nExpected URL: ${url}\nLast HTTP response: ${code}\n\nEnable **Settings → Pages → Source: GitHub Actions**, then rerun the deployment workflow.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
