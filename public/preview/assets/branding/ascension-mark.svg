    <path d="M163 119a163 163 0 0 1 209 25" stroke="url(#gold)" stroke-width="10"/>
    <path d="M398 181a163 163 0 0 1-2 166" stroke="url(#cyan)" stroke-width="16" filter="url(#glow)"/>
    <path d="M367 382a163 163 0 0 1-214 3" stroke="url(#gold)" stroke-width="10"/>
    <path d="M159 316a112 112 0 0 1 35-143" stroke="#5ee5f3" stroke-width="7" opacity=".72"/>
    <path d="M220 150a112 112 0 0 1 130 54" stroke="#d7b96b" stroke-width="7" opacity=".78"/>
    <path d="M363 237a112 112 0 0 1-46 112" stroke="#5ee5f3" stroke-width="7" opacity=".72"/>
  </g>
  <g filter="url(#glow)">
    <path d="M256 92l35 64-18 0 0 216-34 0 0-216-18 0z" fill="url(#cyan)"/>
    <path d="M206 373h100l-15 34h-70z" fill="url(#gold)"/>
