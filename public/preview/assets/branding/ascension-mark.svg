<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Project Ascension sigil</title>
  <desc id="desc">A luminous ascending tower enclosed by fractured concentric rings.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="64%">
      <stop offset="0" stop-color="#173b4d"/>
      <stop offset="0.58" stop-color="#081b29"/>
      <stop offset="1" stop-color="#040b13"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2ac9e8"/>
      <stop offset="0.55" stop-color="#a9f7ff"/>
      <stop offset="1" stop-color="#51d7ef"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6dda0"/>
      <stop offset="1" stop-color="#b98a3e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <g fill="none" stroke-linecap="round">
